# /etc/nginx/sites-available/print-fast-marketing.exyconn.com.conf
# Symlink:
#   ln -s /etc/nginx/sites-available/print-fast-marketing.exyconn.com.conf \
#         /etc/nginx/sites-enabled/print-fast-marketing.exyconn.com.conf
#
# After enabling, run:
#   nginx -t && systemctl reload nginx
#   certbot --nginx -d print-fast-marketing.exyconn.com

# ─── HTTP → HTTPS redirect ────────────────────────────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name print-fast-marketing.exyconn.com;

    # Allow Let's Encrypt ACME challenge over HTTP
    location /.well-known/acme-challenge/ {
        root /var/www/print-fast-marketing;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ─── HTTPS site ───────────────────────────────────────────────────────────
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name print-fast-marketing.exyconn.com;

    root /var/www/print-fast-marketing;
    index index.html;

    # SSL — managed by Certbot (placeholders; certbot will overwrite)
    ssl_certificate     /etc/letsencrypt/live/print-fast-marketing.exyconn.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/print-fast-marketing.exyconn.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;

    # ─── Security headers ────────────────────────────────────────────────
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;

    # ─── Compression ─────────────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/javascript
        application/json
        application/xml
        application/xml+rss
        application/rss+xml
        application/atom+xml
        image/svg+xml
        font/woff
        font/woff2;

    # ─── Static asset caching (Astro hashed assets) ──────────────────────
    location /_astro/ {
        access_log off;
        expires 1y;
        add_header Cache-Control "public, immutable, max-age=31536000";
    }

    location ~* \.(?:css|js|woff2?|ttf|eot|otf|svg|jpg|jpeg|png|gif|webp|avif|ico|mp4|webm)$ {
        access_log off;
        expires 30d;
        add_header Cache-Control "public, max-age=2592000";
    }

    # ─── HTML — short cache, must revalidate ─────────────────────────────
    location ~* \.(?:html|xml|txt|json)$ {
        expires 1h;
        add_header Cache-Control "public, max-age=3600, must-revalidate";
    }

    # ─── Astro static-site routing (folder/index.html) ───────────────────
    location / {
        try_files $uri $uri/ $uri.html $uri/index.html =404;
    }

    # Custom 404 (Astro builds /404.html)
    error_page 404 /404.html;
    location = /404.html {
        internal;
    }

    # Hide hidden files (.git, .env, etc.)
    location ~ /\.(?!well-known) {
        deny all;
        return 404;
    }

    # Don't log favicon / robots noise
    location = /favicon.ico { access_log off; log_not_found off; }
    location = /robots.txt  { access_log off; log_not_found off; }

    client_max_body_size 10M;
}
