server {
    listen 80;
    listen [::]:80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;
    server_tokens off;

    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/javascript
        application/json
        application/xml
        application/xml+rss
        application/rss+xml
        application/atom+xml
        image/svg+xml
        font/woff
        font/woff2;

    location = /healthz {
        access_log off;
        default_type text/plain;
        return 200 "ok\n";
    }

    location /_astro/ {
        access_log off;
        expires 1y;
        add_header Cache-Control "public, immutable, max-age=31536000";
    }

    location ~* \.(?:css|js|woff2?|ttf|eot|otf|svg|jpg|jpeg|png|gif|webp|avif|ico|mp4|webm)$ {
        access_log off;
        expires 30d;
        add_header Cache-Control "public, max-age=2592000";
    }

    location ~* \.(?:html|xml|txt|json)$ {
        expires 1h;
        add_header Cache-Control "public, max-age=3600, must-revalidate";
    }

    location / {
        try_files $uri $uri/ $uri.html $uri/index.html =404;
    }

    error_page 404 /404.html;
    location = /404.html {
        internal;
    }

    location ~ /\.(?!well-known) {
        deny all;
        return 404;
    }
}
