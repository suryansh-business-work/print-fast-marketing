name: Build Docker Image & Deploy to VPS

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

env:
  IMAGE_NAME: exyconnprintfast/print-fast-marketing-website
  CONTAINER_NAME: print-fast-marketing
  APP_PORT: '8080'
  REMOTE_HOST: 31.220.49.107
  REMOTE_USER: root
  FALLBACK_SERVER_NAME: 31.220.49.107
  SITE_DOMAIN: marketing.print-fast.com

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:${{ github.sha }}
            ${{ env.IMAGE_NAME }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Install SSH password helper
        run: |
          sudo apt-get update
          sudo apt-get install -y sshpass

      - name: Trust VPS SSH host key
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H "${{ env.REMOTE_HOST }}" >> ~/.ssh/known_hosts

      - name: Deploy container on VPS
        env:
          SSHPASS: ${{ secrets.SSH_PASSWORD }}
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
          IMAGE_REF: ${{ env.IMAGE_NAME }}:${{ github.sha }}
          SITE_DOMAIN: ${{ env.SITE_DOMAIN }}
          CERTBOT_EMAIL: ${{ secrets.CERTBOT_EMAIL }}
        run: |
          set -euo pipefail

          encode() {
            printf '%s' "$1" | base64 -w0
          }

          DOCKERHUB_USERNAME_B64="$(encode "$DOCKERHUB_USERNAME")"
          DOCKERHUB_TOKEN_B64="$(encode "$DOCKERHUB_TOKEN")"
          IMAGE_REF_B64="$(encode "$IMAGE_REF")"
          CONTAINER_NAME_B64="$(encode "${{ env.CONTAINER_NAME }}")"
          APP_PORT_B64="$(encode "${{ env.APP_PORT }}")"
          FALLBACK_SERVER_NAME_B64="$(encode "${{ env.FALLBACK_SERVER_NAME }}")"
          SITE_DOMAIN_B64="$(encode "$SITE_DOMAIN")"
          CERTBOT_EMAIL_B64="$(encode "$CERTBOT_EMAIL")"

          sshpass -e ssh \
            -o StrictHostKeyChecking=yes \
            -o ServerAliveInterval=30 \
            "${{ env.REMOTE_USER }}@${{ env.REMOTE_HOST }}" \
            "DOCKERHUB_USERNAME_B64='$DOCKERHUB_USERNAME_B64' \
             DOCKERHUB_TOKEN_B64='$DOCKERHUB_TOKEN_B64' \
             IMAGE_REF_B64='$IMAGE_REF_B64' \
             CONTAINER_NAME_B64='$CONTAINER_NAME_B64' \
             APP_PORT_B64='$APP_PORT_B64' \
             FALLBACK_SERVER_NAME_B64='$FALLBACK_SERVER_NAME_B64' \
             SITE_DOMAIN_B64='$SITE_DOMAIN_B64' \
             CERTBOT_EMAIL_B64='$CERTBOT_EMAIL_B64' \
             bash -s" <<'REMOTE_SCRIPT'
          set -euo pipefail

          decode() {
            if [[ -n "$1" ]]; then
              printf '%s' "$1" | base64 -d
            fi
          }

          DOCKERHUB_USERNAME="$(decode "$DOCKERHUB_USERNAME_B64")"
          DOCKERHUB_TOKEN="$(decode "$DOCKERHUB_TOKEN_B64")"
          IMAGE_REF="$(decode "$IMAGE_REF_B64")"
          CONTAINER_NAME="$(decode "$CONTAINER_NAME_B64")"
          APP_PORT="$(decode "$APP_PORT_B64")"
          FALLBACK_SERVER_NAME="$(decode "$FALLBACK_SERVER_NAME_B64")"
          SITE_DOMAIN="$(decode "$SITE_DOMAIN_B64")"
          CERTBOT_EMAIL="$(decode "$CERTBOT_EMAIL_B64")"

          if [[ -z "$DOCKERHUB_USERNAME" || -z "$DOCKERHUB_TOKEN" ]]; then
            echo "Docker Hub credentials are required."
            exit 1
          fi

          export DEBIAN_FRONTEND=noninteractive

          apt-get update
          apt-get install -y ca-certificates curl gnupg nginx certbot python3-certbot-nginx

          if ! command -v docker >/dev/null 2>&1; then
            curl -fsSL https://get.docker.com | sh
          fi

          systemctl enable --now docker
          systemctl enable --now nginx

          printf '%s' "$DOCKERHUB_TOKEN" | docker login --username "$DOCKERHUB_USERNAME" --password-stdin
          docker pull "$IMAGE_REF"

          docker rm -f "$CONTAINER_NAME" >/dev/null 2>&1 || true
          docker run -d \
            --name "$CONTAINER_NAME" \
            --restart unless-stopped \
            -p "127.0.0.1:${APP_PORT}:80" \
            "$IMAGE_REF"

          echo "Waiting for ${CONTAINER_NAME} to become healthy on 127.0.0.1:${APP_PORT}..."
          for attempt in {1..30}; do
            if curl -fsS "http://127.0.0.1:${APP_PORT}/healthz" >/dev/null 2>&1; then
              break
            fi

            if [[ "$attempt" -eq 30 ]]; then
              echo "Container health check failed after ${attempt} attempts."
              docker ps -a --filter "name=${CONTAINER_NAME}"
              docker logs --tail 100 "$CONTAINER_NAME" || true
              exit 1
            fi

            sleep 2
          done

          mkdir -p /etc/nginx/snippets /var/www/certbot

          PROXY_SNIPPET=/etc/nginx/snippets/print-fast-marketing-proxy.conf
          cat > "$PROXY_SNIPPET" <<NGINX
          location /.well-known/acme-challenge/ {
              root /var/www/certbot;
          }

          location / {
              proxy_pass http://127.0.0.1:${APP_PORT};
              proxy_http_version 1.1;
              proxy_set_header Host \$host;
              proxy_set_header X-Real-IP \$remote_addr;
              proxy_set_header X-Forwarded-For \$proxy_add_x_forwarded_for;
              proxy_set_header X-Forwarded-Proto \$scheme;
              proxy_set_header Connection "";
          }
          NGINX

          NGINX_CONF=/etc/nginx/sites-available/print-fast-marketing.conf
          cat > "$NGINX_CONF" <<NGINX
          server {
              listen 80 default_server;
              listen [::]:80 default_server;
              server_name ${FALLBACK_SERVER_NAME} _;

              include ${PROXY_SNIPPET};
          }
          NGINX

          if [[ -n "$SITE_DOMAIN" ]]; then
            cat >> "$NGINX_CONF" <<NGINX

          server {
              listen 80;
              listen [::]:80;
              server_name ${SITE_DOMAIN};

              include ${PROXY_SNIPPET};
          }
          NGINX
          fi

          rm -f /etc/nginx/sites-enabled/default
          ln -sf "$NGINX_CONF" /etc/nginx/sites-enabled/print-fast-marketing.conf
          nginx -t
          systemctl reload nginx

          echo "Verifying host Nginx proxy for ${FALLBACK_SERVER_NAME}..."
          for attempt in {1..15}; do
            if curl -fsS -H "Host: ${FALLBACK_SERVER_NAME}" "http://127.0.0.1/healthz" >/dev/null 2>&1; then
              break
            fi

            if [[ "$attempt" -eq 15 ]]; then
              echo "Host Nginx IP route failed after ${attempt} attempts."
              nginx -T | tail -n 120
              docker ps -a --filter "name=${CONTAINER_NAME}"
              docker logs --tail 100 "$CONTAINER_NAME" || true
              exit 1
            fi

            sleep 2
          done

          if [[ -n "$SITE_DOMAIN" ]]; then
            if [[ "$SITE_DOMAIN" =~ ^[0-9]+(\.[0-9]+){3}$ ]]; then
              echo "Skipping Certbot because SITE_DOMAIN is an IP address."
            else
              DOMAIN_IPS="$(getent ahostsv4 "$SITE_DOMAIN" | awk '{print $1}' | sort -u || true)"
              echo "${SITE_DOMAIN} resolves to: ${DOMAIN_IPS:-no A record found}"

              if [[ -z "$DOMAIN_IPS" ]]; then
                echo "DNS is not ready: ${SITE_DOMAIN} has no public A record on this server."
                echo "Add ${SITE_DOMAIN} A ${FALLBACK_SERVER_NAME} at the authoritative DNS provider, then rerun the workflow."
                exit 1
              fi

              if ! printf '%s\n' "$DOMAIN_IPS" | grep -Fxq "$FALLBACK_SERVER_NAME"; then
                echo "DNS is not pointing at this VPS. Expected ${FALLBACK_SERVER_NAME}, got: ${DOMAIN_IPS}"
                exit 1
              fi

              CERTBOT_ARGS=(
                --nginx
                -d "$SITE_DOMAIN"
                --non-interactive
                --agree-tos
                --redirect
                --keep-until-expiring
              )

              if [[ -n "$CERTBOT_EMAIL" ]]; then
                CERTBOT_ARGS+=(-m "$CERTBOT_EMAIL")
              else
                CERTBOT_ARGS+=(--register-unsafely-without-email)
              fi

              certbot "${CERTBOT_ARGS[@]}"
            fi
          else
            echo "Skipping Certbot; SITE_DOMAIN is not set."
          fi

          docker image prune -af \
            --filter "label=com.exyconn.print-fast.app=marketing-website" \
            --filter "until=168h" >/dev/null 2>&1 || true

          echo "Deployed ${IMAGE_REF} to http://${FALLBACK_SERVER_NAME}"
          REMOTE_SCRIPT

      - name: Verify public IP route
        run: |
          curl -fsS \
            --retry 10 \
            --retry-delay 3 \
            --retry-connrefused \
            "http://${{ env.FALLBACK_SERVER_NAME }}/healthz" >/dev/null

      - name: Verify public domain routes
        run: |
          curl -fsS \
            --retry 10 \
            --retry-delay 6 \
            --retry-connrefused \
            "http://${{ env.SITE_DOMAIN }}/healthz" >/dev/null

          curl -fsS \
            --retry 10 \
            --retry-delay 6 \
            --retry-connrefused \
            "https://${{ env.SITE_DOMAIN }}/healthz" >/dev/null

      - name: Deployment summary
        run: |
          echo "Docker image: ${{ env.IMAGE_NAME }}:${{ github.sha }}"
          echo "VPS URL: http://${{ env.FALLBACK_SERVER_NAME }}"
          echo "Domain URL: https://${{ env.SITE_DOMAIN }}"
          echo "Time: $(date -u)"
